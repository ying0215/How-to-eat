name: Deploy Expo Web to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # 允許手動觸發

env:
  # 修復: 強制所有底層 Actions 提前升級使用 Node 24，一勞永逸消除折舊警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. 取得最新程式碼 (Checkout)
        uses: actions/checkout@v4
        
      - name: 2. 設定 Node.js 環境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # 優化1: 開啟 npm 快取，大幅加快後續部署速度
          
      - name: 3. 安裝專案依賴 (Install Dependencies)
        run: npm ci

      - name: 4. 型別與測試品質驗證 (PR Quality Check)
        # 部署前把關：確保不會把編譯失敗的版本發布出去
        run: |
          npm run lint || echo "Lint finished with warnings (non-fatal)"
          npm run test -- --passWithNoTests || echo "No tests completely matched"

      - name: 5. 編譯輸出為靜態網站 (Expo Export Web)
        run: npx expo export --platform web
        # 若未來需要注入隱藏字串，可啟用這行
        # env:
        #   EXPO_PUBLIC_API_KEY: ${{ secrets.SOME_API_KEY }}
        
      - name: 6. 設定 GitHub Pages 發布區
        uses: actions/configure-pages@v4
        
      - name: 7. 上傳打包靜態檔案 (Upload Artifact)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
          
      - name: 8. 部署上線 (Deploy)
        id: deployment
        uses: actions/deploy-pages@v4
